<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Demon Slayer - Trio Principal</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="caixa-principal">
        
        <div id="tela-inicial">
            <h1>Você está pronto para descobrir sua respiração?</h1>
            <p class="texto-inicial">
                Entre no universo de kimetsu no yaiba e descubra qual dos caçadores 
                mais combina com a sua personalidade através deste QUIZ.
            </p>
            
            <div class="banner-inicio">
                <img src="https://4kwallpapers.com/images/walls/thumbs_3t/23652.jpg" alt="trio principal demon slayer" class="img-home">
            </div>

            <div class="area-botoes">
                <button onclick="iniciarQuiz()" class="btn-principal">Iniciar jornada</button>
            </div>
        </div>

        <div id="tela-quiz" class="oculta">
            <div class="progresso-fundo">
                <div id="barra-progresso" class="progresso-cor"></div>
            </div>
            
            <div id="pergunta-atual"></div>

            <div class="area-botoes">
                <button id="btn-proxima" onclick="proximaPergunta()">Próxima Pergunta</button>
            </div>
        </div>

        <div id="tela-resultado" class="oculta">
            <div id="resultado">
                </div>
            <div class="area-botoes">
                <button onclick="reiniciarQuiz()">Refazer Quiz</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
